name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step A: Python kurulumu ve bağımlılıkların yüklenmesi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest selenium

      # Step B: Birim testinin çalıştırılması
      - name: Execute Unit Test
        run: pytest test_tax_calculator.py

      # Step C: Selenium arayüz testinin çalıştırılması
      - name: Execute Selenium UI Test
        run: pytest test_ui.py

      # Step D: Başarılı durumlarda dağıtım mesajının yazdırılması
      - name: Print Deployment Confirmation
        if: success()
        run: echo "All tests passed! Application successfully deployed to production."